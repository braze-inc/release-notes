name: Mirror public docs markdown from braze-docs

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mirror-public-docs-markdown
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination repo on main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Build sitemap-driven markdown mirror from public docs
        run: |
          set -euo pipefail
          python3 scripts/sync_public_docs_markdown.py

          mkdir -p docs
          for section in "User Guide" "Developer Guide" "API" "Technology Partners" "What's New"; do
            mkdir -p "docs/${section}"
            rsync -av --delete "sync-staging/${section}/" "docs/${section}/"
          done

          # Remove legacy path from the previous release-notes import model.
          rm -rf docs/releases

      - name: Write daily changes report
        run: |
          set -euo pipefail
          git add -A -- "docs/User Guide" "docs/Developer Guide" "docs/API" "docs/Technology Partners" "docs/What's New" docs/releases
          CHANGES="$(git diff --cached --name-status -- "docs/User Guide" "docs/Developer Guide" "docs/API" "docs/Technology Partners" "docs/What's New" docs/releases)"
          if [ -z "$CHANGES" ]; then
            echo "No markdown changes detected."
            exit 0
          fi

          TODAY="$(date -u +%Y-%m-%d)"
          LOG_FILE="changes/${TODAY}.md"
          mkdir -p changes
          COUNT="$(printf "%s\n" "$CHANGES" | sed '/^$/d' | wc -l | tr -d ' ')"

          {
            echo "# Daily docs markdown sync - ${TODAY}"
            echo
            echo "## Summary"
            echo "- Source: https://www.braze.com/docs/sitemap.xml"
            echo "- Changed files: ${COUNT}"
            echo
            echo "## Changes"
            printf "%s\n" "$CHANGES" | sed '/^$/d' | while IFS=$'\t' read -r status path; do
              echo "- ${status} \`${path}\`"
            done
          } > "$LOG_FILE"

          git add "$LOG_FILE"

      - name: Commit and push direct to main if changed
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet --cached; then
            echo "No public markdown changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "Mirror public docs markdown from braze.com/docs"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:main"
