name: Sync release notes from braze-docs

on:
  schedule:
    # 1x per month: 1st day of month at 15:00 UTC
    - cron: "0 15 1 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-release-notes
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      SOURCE_REPO: braze-inc/braze-docs
      SOURCE_REF: develop
      SOURCE_RELEASE_PATH: _docs/_releases
      DEST_RELEASE_PATH: releases

    steps:
      - name: Validate required secret
        if: ${{ secrets.BRAZE_DOCS_READ_TOKEN == '' }}
        run: |
          echo "Missing required secret: BRAZE_DOCS_READ_TOKEN"
          exit 1

      - name: Checkout destination repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout source repo
        uses: actions/checkout@v5
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.BRAZE_DOCS_READ_TOKEN }}
          path: source
          persist-credentials: false
          sparse-checkout: |
            _docs/_releases
          sparse-checkout-cone-mode: false

      - name: Verify source path exists
        run: |
          if [ ! -d "source/${SOURCE_RELEASE_PATH}" ]; then
            echo "Expected source path not found: source/${SOURCE_RELEASE_PATH}"
            exit 1
          fi

      - name: Sync markdown files only
        run: |
          mkdir -p "${DEST_RELEASE_PATH}"

          rsync -av --delete --prune-empty-dirs \
            --include "*/" \
            --include "*.md" \
            --exclude "*" \
            "source/${SOURCE_RELEASE_PATH}/" \
            "${DEST_RELEASE_PATH}/"

      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- "${DEST_RELEASE_PATH}"; then
            echo "No release note changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${DEST_RELEASE_PATH}"
          git commit -m "Sync release notes from braze-docs"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
